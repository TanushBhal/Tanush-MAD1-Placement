{% extends "base.html" %}

{% block content %}

<div class="d-flex align-items-center justify-content-between" style="margin-bottom:1.75rem;">
  <h2 class="page-title" style="margin-bottom:0;">Pending Approvals</h2>
  <a href="/admin-dashboard" class="btn btn-secondary btn-sm">← Dashboard</a>
</div>

{% for company in companies %}
<div class="card approval-card mb-3">
<div class="card-body d-flex justify-content-between align-items-center">
  <div>
    <h5 style="margin-bottom:3px;font-size:1rem;">{{ company["company_name"] }}</h5>
    <p class="text-muted" style="font-size:0.82rem;margin:0;">{{ company["website"] }}</p>
  </div>
  <a class="btn btn-success btn-sm" href="/admin/approve-company/{{ company['id'] }}">Approve ✓</a>
</div>
</div>

{% else %}
<div class="alert alert-info">No companies waiting for approval.</div>
{% endfor %}

{% endblock %}
