{% extends "base.html" %}

{% block content %}

<div class="d-flex align-items-center justify-content-between" style="margin-bottom:1.75rem;">
  <h2 class="page-title" style="margin-bottom:0;">Pending Drives</h2>
  <a href="/admin-dashboard" class="btn btn-secondary btn-sm">← Dashboard</a>
</div>

{% for drive in drives %}
<div class="card approval-card mb-3">
<div class="card-body">
  <div class="d-flex justify-content-between align-items-start">
    <div>
      <h5 style="margin-bottom:4px;font-size:1rem;">{{ drive["company_name"] }}</h5>
      <p class="text-muted" style="font-size:0.88rem;margin-bottom:0.5rem;">{{ drive["job_title"] }}</p>
      <div class="d-flex gap-2 flex-wrap">
        <span class="drive-tag">📍 {{ drive["location"] }}</span>
        <span class="drive-tag">💰 {{ drive["package"] }}</span>
      </div>
    </div>
    <a class="btn btn-success btn-sm" href="/admin/approve-drive/{{ drive['id'] }}">Approve ✓</a>
  </div>
</div>
</div>

{% else %}
<div class="alert alert-info">No pending placement drives.</div>
{% endfor %}

{% endblock %}
