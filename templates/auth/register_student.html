{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
<div class="col-md-5">

<div class="card">
<div class="card-body">
  <h3 class="mb-1" style="font-size:1.5rem;">Student Registration</h3>
  <p class="text-muted mb-4" style="font-size:0.85rem;">Create your student account</p>

  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input class="form-control" name="full_name" placeholder="Your full name" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" name="email" placeholder="college@email.com" required>
    </div>
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Phone</label>
        <input class="form-control" name="phone" placeholder="+91 XXXXXXXXXX">
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">Branch</label>
        <input class="form-control" name="branch" placeholder="e.g. CSE">
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" name="password" placeholder="Choose a strong password" required>
    </div>
    <div class="d-grid mb-3">
      <button class="btn btn-primary">Create Account</button>
    </div>
  </form>

  <p class="text-center text-muted" style="font-size:0.83rem;">
    Already have an account? <a href="/login">Sign in</a>
  </p>

</div>
</div>

</div>
</div>
{% endblock %}
