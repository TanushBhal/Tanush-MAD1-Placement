{% extends "base.html" %}

{% block content %}

<div class="d-flex align-items-center justify-content-between" style="margin-bottom:1.75rem;">
  <h2 class="page-title" style="margin-bottom:0;">Create Placement Drive</h2>
  <a href="/company-dashboard" class="btn btn-secondary btn-sm">← Back</a>
</div>

<div class="row justify-content-start">
<div class="col-md-7">
<div class="card">
<div class="card-body">

  <form method="POST">

    <div class="mb-3">
      <label class="form-label">Job Title</label>
      <input type="text" class="form-control" name="job_title" placeholder="e.g. Software Engineer" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Job Description</label>
      <textarea class="form-control" name="job_description" rows="3" placeholder="Describe the role and responsibilities..."></textarea>
    </div>

    <div class="mb-3">
      <label class="form-label">Eligibility Criteria</label>
      <input type="text" class="form-control" name="eligibility" placeholder="e.g. CGPA ≥ 7.0, Any branch">
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Package</label>
        <input type="text" class="form-control" name="package" placeholder="e.g. 12 LPA">
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">Location</label>
        <input type="text" class="form-control" name="location" placeholder="e.g. Bangalore">
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label">Application Deadline</label>
      <input type="date" class="form-control" name="deadline">
    </div>

    <button class="btn btn-primary">Publish Drive</button>

  </form>

</div>
</div>
</div>
</div>

{% endblock %}
